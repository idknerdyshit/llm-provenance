name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_TOOLCHAIN: 1.88.0

jobs:
  quality:
    name: Format and Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.88.0
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt --component clippy

      - name: Check formatting
        run: cargo +"$RUST_TOOLCHAIN" fmt --all --check

      - name: Run Clippy
        run: cargo +"$RUST_TOOLCHAIN" clippy --locked --all-features --all-targets -- -D warnings

  tests:
    name: Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default features
            args: ""
          - name: all features
            args: --all-features
          - name: no default features
            args: --no-default-features
          - name: tracing only
            args: --no-default-features --features tracing
          - name: sensitive diagnostics only
            args: --no-default-features --features sensitive-diagnostics
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.88.0
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal

      - name: Run tests
        run: cargo +"$RUST_TOOLCHAIN" test --locked ${{ matrix.args }}

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.88.0
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo +"$RUST_TOOLCHAIN" doc --locked --no-deps

  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.88.0
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal

      - name: Package crate
        run: cargo +"$RUST_TOOLCHAIN" package --locked
